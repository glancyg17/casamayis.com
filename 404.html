<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Casa Mayis</title>
<link rel="icon" type="image/png" href="assets/icons/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --crema: #F5F0E8;
    --tierra: #8B6B4A;
    --dorado: #C9A96E;
    --salvia: #7A8C6E;
    --carbon: #2C2416;
    --carbon-suave: #4A3F2F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--crema);
    color: var(--carbon);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    letter-spacing: 0.2em;
    color: var(--carbon);
    text-decoration: none;
    margin-bottom: 64px;
    opacity: 0.6;
  }
  .number {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(80px, 20vw, 160px);
    font-weight: 300;
    color: var(--dorado);
    opacity: 0.3;
    line-height: 1;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 400;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  h1 em { font-style: italic; color: var(--tierra); }
  p {
    font-size: 15px;
    color: var(--carbon-suave);
    line-height: 1.9;
    max-width: 380px;
    margin-bottom: 48px;
  }
  .btn {
    display: inline-block;
    padding: 14px 36px;
    border: 1px solid var(--dorado);
    color: var(--carbon);
    text-decoration: none;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    transition: background 0.3s, color 0.3s;
  }
  .btn:hover { background: var(--dorado); color: #fff; }
</style>
</head>
<body>
  <a href="/" class="logo">CASA MAYIS</a>
  <div class="number">404</div>
  <h1>Esta página<br><em>no existe</em></h1>
  <p>Parece que te perdiste en el camino. No te preocupes — el refugio sigue aquí.</p>
  <a href="/" class="btn">Volver al inicio</a>
</body>
</html>
